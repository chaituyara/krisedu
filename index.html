<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KE Info Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0b0b0b;color:#fff}
header{padding:20px;text-align:center;background:#000}
.logo{font-family:'Playfair Display';color:#d4af37;font-size:28px}
.section{padding:40px;text-align:center}
h2{color:#d4af37;margin-bottom:20px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#111;padding:15px;border:1px solid #222}
.card img{width:100%;height:180px;object-fit:cover}
.card h3{margin:10px 0}
.card p{font-size:14px;color:#bbb}
button{margin-top:10px;padding:8px 14px;border:none;background:#d4af37;color:#000;cursor:pointer}

/* login */
.login{padding:20px;text-align:center}
.login input{padding:10px;margin:5px;background:#111;border:1px solid #333;color:#fff}

/* admin */
.admin{padding:30px;border-top:1px solid #222}
.admin input,.admin textarea{width:100%;margin:5px 0;padding:10px;background:#111;border:1px solid #333;color:#fff}

footer{padding:20px;text-align:center;border-top:1px solid #222;color:#777}
</style>
</head>
<body>

<header><div class="logo">KE Info Hub</div></header>

<!-- LOGIN -->
<div class="login">
<h2>Member Access</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<br>
<button onclick="login()">Login</button>
<p id="loginStatus"></p>
</div>

<!-- CONTENT -->
<section class="section">
<h2>Explore</h2>
<div class="grid" id="contentGrid">

<div class="card" data-id="1">
<img src="img1.jpg">
<h3>Topic One</h3>
<p>Example information about this topic.</p>
<button onclick="saveItem(1)">Save</button>
</div>

</div>
</section>

<!-- SAVED -->
<section class="section">
<h2>Saved Items</h2>
<div id="saved"></div>
</section>

<!-- SUBSCRIBE -->
<section class="section">
<h2>Subscribe</h2>
<form action="https://formspree.io/f/yourformid" method="POST">
<input type="email" name="email" placeholder="Enter email" required>
<br>
<button type="submit">Subscribe</button>
</form>
</section>

<!-- ADMIN -->
<section class="admin">
<h2>Add Content (Admin)</h2>
<input type="text" id="title" placeholder="Title">
<textarea id="desc" placeholder="Description"></textarea>
<input type="text" id="img" placeholder="Image filename (img4.jpg)">
<button onclick="addContent()">Add</button>
</section>

<footer>© 2026 KE</footer>

<script>

// fake login
function login(){
 const user=document.getElementById('username').value;
 const pass=document.getElementById('password').value;
 if(user==='admin' && pass==='1234'){
  document.getElementById('loginStatus').innerText='Logged in';
 }else{
  document.getElementById('loginStatus').innerText='Wrong details';
 }
}

// save items
function saveItem(id){
 let saved=JSON.parse(localStorage.getItem('saved'))||[];
 if(!saved.includes(id)){
  saved.push(id);
  localStorage.setItem('saved',JSON.stringify(saved));
  loadSaved();
 }
}

function loadSaved(){
 let saved=JSON.parse(localStorage.getItem('saved'))||[];
 let container=document.getElementById('saved');
 container.innerHTML='';
 saved.forEach(id=>{
  container.innerHTML += `<p>Saved Item ${id}</p>`;
 });
}
loadSaved();

// add content
function addContent(){
 const title=document.getElementById('title').value;
 const desc=document.getElementById('desc').value;
 const img=document.getElementById('img').value;

 const newCard=`<div class="card"><img src="${img}"><h3>${title}</h3><p>${desc}</p></div>`;
 document.getElementById('contentGrid').innerHTML += newCard;
}

</script>

</body>
</html>
