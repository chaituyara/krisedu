<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kris Edu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0b0b0b;color:#fff;overflow-x:hidden}

#loader{position:fixed;inset:0;background:#0b0b0b;display:flex;align-items:center;justify-content:center;z-index:2000;transition:.6s}
#loader h1{font-family:'Playfair Display';color:#d4af37;font-size:42px;animation:pulse 1.5s infinite}
@keyframes pulse{0%{opacity:.4}50%{opacity:1}100%{opacity:.4}}

header{position:fixed;width:100%;display:flex;justify-content:space-between;padding:20px 40px;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);z-index:1000}
.logo img{height:40px}
nav a{margin-left:20px;color:#ccc;text-decoration:none}
nav a:hover{color:#d4af37}

.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.hero h1{font-family:'Playfair Display';font-size:64px;color:#d4af37;opacity:0;transform:translateY(40px)}
.hero p{color:#aaa;max-width:600px;opacity:0;transform:translateY(40px)}
.btn{margin-top:20px;padding:12px 28px;border:1px solid #d4af37;color:#d4af37;text-decoration:none;opacity:0;transform:translateY(40px)}

/* Story sections */
.story{height:120vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 20px}
.story h2{font-family:'Playfair Display';font-size:42px;max-width:700px;line-height:1.4;opacity:0;transform:translateY(80px);transition:1s}
.story.show h2{opacity:1;transform:translateY(0)}

.section{padding:100px 20px;text-align:center;opacity:0;transform:translateY(60px);transition:1s}
.section.show{opacity:1;transform:translateY(0)}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-top:40px}
.card{background:#111;padding:25px;border:1px solid #222;opacity:0;transform:translateY(40px);transition:.8s}
.card.show{opacity:1;transform:translateY(0)}

footer{padding:30px;text-align:center;border-top:1px solid #222;color:#777}
</style>
</head>
<body>

<div id="loader"><h1>KE</h1></div>

<header>
<div class="logo"><img src="logo.png"></div>
<nav>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<h1 class="fade">Kris Edu</h1>
<p class="fade">A different way to approach education.</p>
<a href="#contact" class="btn fade">Start</a>
</section>

<!-- Storytelling sections -->
<section class="story"><h2>Most students feel lost.</h2></section>
<section class="story"><h2>Too much information. No direction.</h2></section>
<section class="story"><h2>That’s where Kris Edu comes in.</h2></section>
<section class="story"><h2>Clarity. Strategy. Real results.</h2></section>

<section class="section">
<h2 style="color:#d4af37">What You Get</h2>
<div class="grid">
<div class="card">1:1 Guidance</div>
<div class="card">Study System</div>
<div class="card">Performance Growth</div>
</div>
</section>

<section id="contact" class="section">
<h2 style="color:#d4af37">Apply</h2>
<form action="https://formspree.io/f/yourformid" method="POST">
<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Your goal"></textarea>
<button type="submit">Submit</button>
</form>
</section>

<footer>© 2026 Kris Edu</footer>

<script>
window.addEventListener('load',()=>{
const loader=document.getElementById('loader');
setTimeout(()=>{loader.style.opacity='0';setTimeout(()=>loader.style.display='none',600)},1200);

document.querySelectorAll('.fade').forEach((el,i)=>{
setTimeout(()=>{el.style.opacity=1;el.style.transform='translateY(0)';el.style.transition='1s'},i*300)
});
});

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){entry.target.classList.add('show')}
})
},{threshold:.4});

document.querySelectorAll('.story,.section,.card').forEach(el=>observer.observe(el));
</script>

</body>
</html>
